<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>사가현 실시간 방재 포털</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --primary: #0056b3; }
        body { background-color: #f0f2f5; }
        #map { height: 450px; width: 100%; border-radius: 12px; z-index: 1; background: #ddd; }
        .emergency-banner { background-color: #546e7a; color: white; padding: 12px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 20px; }
        .status-card { padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 800px) { .grid-container { grid-template-columns: 1fr; } }
        #weather-text { font-size: 1.2rem; font-weight: bold; color: #1a1a1a; }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <hgroup>
                <h1>사가현 방재 감시 시스템</h1>
                <p>Saga Prefecture Real-time Weather Monitor</p>
            </hgroup>
        </header>

        <div id="status-banner" class="emergency-banner">시스템 초기화 중...</div>

        <div class="grid-container">
            <aside>
                <div class="status-card">
                    <h4>🌤️ 현재 예보</h4>
                    <div id="weather-text">데이터 로딩 중...</div>
                    <hr>
                    <p id="temp-display">기온: 측정 중...</p>
                    <small id="update-time" style="color:#777;"></small>
                </div>
                <div class="status-card">
                    <h5>🔗 긴급 링크</h5>
                    <ul style="font-size: 0.9rem; padding-left: 1rem;">
                        <li><a href="https://www.bousai.pref.saga.lg.jp/" target="_blank">사가현 방재 정보</a></li>
                        <li><a href="https://www.jma.go.jp/bosai/map.html#contents=warning&area_code=410000" target="_blank">기상청 특보 (사가)</a></li>
                    </ul>
                </div>
            </aside>

            <section>
                <div class="status-card">
                    <h4 style="margin-bottom:10px;">📡 실시간 강수 레이더</h4>
                    <div id="map"></div>
                    <p style="margin-top:10px; font-size:0.8rem; color:#666;">
                        * 일본 기상청(JMA) 나우캐스트 타일 레이어가 지도 위에 표시됩니다.
                    </p>
                </div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const statusBanner = document.getElementById('status-banner');
            const weatherText = document.getElementById('weather-text');
            const updateTime = document.getElementById('update-time');

            // 1. 지도 초기화 (사가현청 중심)
            const map = L.map('map').setView([33.2635, 130.3008], 9);
            
            // 기본 베이스 맵 (OpenStreetMap)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 사가현 마커
            L.marker([33.2635, 130.3008]).addTo(map).bindPopup("사가현청").openPopup();

            // 2. 통합 데이터 로드 함수
            async function loadDisasterData() {
                try {
                    statusBanner.innerText = "데이터 동기화 중...";
                    
                    // [기상 예보 데이터 가져오기]
                    const weatherUrl = "https://www.jma.go.jp/bosai/forecast/data/forecast/410000.json";
                    const wResponse = await fetch(weatherUrl);
                    if (!wResponse.ok) throw new Error("예보 서버 응답 없음");
                    const wData = await wResponse.json();

                    // 데이터 파싱 (사가 지역 정보)
                    const sagaForecast = wData[0].series[0].areas[0];
                    const reportTime = wData[0].reportDatetime;
                    weatherText.innerText = sagaForecast.weathers[0];
                    updateTime.innerText = "발표 시각: " + new Date(reportTime).toLocaleString();

                    // [레이더 타임스탬프 및 레이어 적용]
                    const radarTargetUrl = "https://www.jma.go.jp/bosai/jmatile/data/nowc/target.json";
                    const rResponse = await fetch(radarTargetUrl);
                    const rData = await rResponse.json();
                    const latestTimestamp = rData[0];

                    // 레이더 레이어 생성 및 추가
                    L.tileLayer(`https://www.jma.go.jp/bosai/jmatile/data/nowc/${latestTimestamp}/none/{z}/{x}/{y}.png`, {
                        opacity: 0.65,
                        zIndex: 100
                    }).addTo(map);

                    // 성공 시 UI 업데이트
                    statusBanner.style.backgroundColor = "#2e7d32";
                    statusBanner.innerText = "✅ 시스템 정상 작동 중 (데이터 동기화 완료)";

                    // 비 예보 시 경고 색상 변경
                    if(sagaForecast.weathers[0].includes("비") || sagaForecast.weathers[0].includes("강한")) {
                        statusBanner.style.backgroundColor = "#d81b60";
                        statusBanner.innerText = "⚠️ 기상 주의: 비 예보가 감지되었습니다.";
                    }

                } catch (error) {
                    console.error("Critical Error:", error);
                    statusBanner.style.backgroundColor = "#c62828";
                    statusBanner.innerText = "❌ 데이터 동기화 실패 (네트워크 또는 API 지연)";
                    weatherText.innerText = "정보 로드 실패";
                }
            }

            // 초기 실행
            loadDisasterData();
            
            // 5분마다 자동 갱신
            setInterval(loadDisasterData, 300000);
        });
    </script>
</body>
</html>
