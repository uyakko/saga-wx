<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사가현 방재 포털 (Saga Bosai)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* 지도가 UI 텍스트 위로 올라오지 않게 z-index 조정 */
        #map { height: 600px; width: 100%; border-radius: 0.75rem; z-index: 10; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="max-w-5xl mx-auto py-8 px-4">
        <header class="mb-6 flex justify-between items-end border-b pb-4 border-gray-300">
            <div>
                <h1 class="text-3xl font-bold text-blue-900">사가현 방재 맵 프로토타입</h1>
                <p class="text-gray-600 font-medium mt-1">실시간 기상 및 레이더 모니터링 시스템</p>
            </div>
            <div id="updateTime" class="text-sm text-gray-500 font-mono">데이터 로딩 중...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="md:col-span-1 space-y-4">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-sm font-bold text-gray-500 uppercase mb-2">사가시 현재 기온</h2>
                    <div class="flex items-center">
                        <span class="text-4xl">🌡️</span>
                        <span id="currentTemp" class="text-4xl font-black text-gray-800 ml-2">-</span>
                        <span class="text-2xl text-gray-500 font-bold ml-1">°C</span>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-sm font-bold text-gray-500 uppercase mb-2">현재 풍속</h2>
                    <div class="flex items-center">
                        <span class="text-4xl">💨</span>
                        <span id="currentWind" class="text-4xl font-black text-gray-800 ml-2">-</span>
                        <span class="text-lg text-gray-500 font-bold ml-1">km/h</span>
                    </div>
                </div>

                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 text-sm text-blue-800">
                    <p class="font-bold mb-1">💡 레이더 보는 법</p>
                    <p>지도 위의 색상은 강수 강도를 나타냅니다. (파란색: 약함 ➔ 빨간색/보라색: 강함)</p>
                </div>
            </div>

            <div class="md:col-span-3">
                <div id="map" class="shadow-md border border-gray-300"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 지도 초기화 (사가현청 좌표 기준)
        const sagaLat = 33.2635;
        const sagaLon = 130.3009;
        const map = L.map('map').setView([sagaLat, sagaLon], 10);

        // 기본 베이스 맵 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        // 사가현 마커 추가
        L.marker([sagaLat, sagaLon]).addTo(map)
            .bindPopup('<b>사가현 (Saga)</b><br>관측 기준점')
            .openPopup();

        // 2. 현재 날씨 데이터 가져오기 (Open-Meteo API)
        async function fetchWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${sagaLat}&longitude=${sagaLon}&current_weather=true&timezone=Asia%2FTokyo`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.current_weather) {
                    document.getElementById('currentTemp').textContent = data.current_weather.temperature;
                    document.getElementById('currentWind').textContent = data.current_weather.windspeed;
                    
                    const now = new Date();
                    document.getElementById('updateTime').textContent = `최종 업데이트: ${now.toLocaleTimeString()}`;
                }
            } catch (error) {
                console.error("날씨 데이터를 불러오는데 실패했습니다.", error);
            }
        }

        // 3. 강수 레이더 추가 (RainViewer API)
        async function fetchRadar() {
            try {
                // RainViewer API에서 가장 최근 레이더 타임스탬프 정보 가져오기
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();

                const radarPast = data.radar.past;
                if (radarPast.length > 0) {
                    // 가장 최신 데이터 타임스탬프 선택
                    const latestRadar = radarPast[radarPast.length - 1].path;

                    // 레이더 타일 레이어 지도에 추가 (투명도 0.6)
                    L.tileLayer(`https://tilecache.rainviewer.com${latestRadar}/256/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0.6,
                        attribution: 'Weather data © RainViewer'
                    }).addTo(map);
                }
            } catch (error) {
                console.error("레이더 데이터를 불러오는데 실패했습니다.", error);
            }
        }

        // 함수 실행
        fetchWeather();
        fetchRadar();

        // 10분마다 기상 데이터 갱신
        setInterval(fetchWeather, 600000);
    </script>
</body>
</html>
