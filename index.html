<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사가현 방재 & 기상 종합 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 800px; width: 100%; border-radius: 1rem; z-index: 10; }
        
        /* 통합 기상 마커 디자인 */
        .weather-card-marker {
            background: white; border: 2px solid #3b82f6; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 4px; transition: all 0.2s;
        }
        .weather-card-marker:hover { transform: scale(1.1); z-index: 1000 !important; }

        /* 풍향 화살표 */
        .wind-arrow { display: inline-block; font-size: 14px; color: #3b82f6; line-height: 1; }

        /* 팝업 창 커스터마이징 */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 320px !important; }
        .forecast-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
        .forecast-scroll::-webkit-scrollbar { height: 4px; }
        .forecast-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-7xl mx-auto py-8 px-4">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-end border-b pb-4 border-slate-300">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">사가현 종합 방재 포털</h1>
                <p class="text-slate-500 font-medium mt-1">레이더 · 기상특보 · 시정촌별 상세 예보(JMA)</p>
            </div>
            <div id="updateTime" class="text-sm text-slate-400 font-mono mt-2 md:mt-0">데이터 갱신 중...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                
                <div id="warningCard" class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-slate-300">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">사가현 기상 특보 (JMA)</h2>
                    <div id="warningContent" class="text-sm font-bold text-slate-700">
                        데이터를 불러오는 중...
                    </div>
                </div>

                <div class="bg-slate-100 p-5 rounded-xl border border-slate-200 text-xs text-slate-600">
                    <p class="font-bold mb-3 text-slate-700 text-sm">💡 화면 보는 법</p>
                    
                    <p class="font-bold text-slate-500 mb-1 mt-3">강수 레이더</p>
                    <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-blue-400"></span> 약한 비</div>
                    <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-yellow-400"></span> 강한 비</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-500"></span> 매우 강한 비</div>

                    <p class="font-bold text-slate-500 mb-1 mt-4">지도 마커 (클릭 시 상세예보)</p>
                    <div class="flex items-center gap-2 mb-1"><span>🌡️</span> 중앙 숫자: 현재 기온</div>
                    <div class="flex items-center gap-2 mb-1"><span>⬆️</span> 화살표: 바람 부는 방향 (풍향)</div>
                    <div class="flex items-center gap-2"><span>🟦</span> 파란 숫자: 풍속 (km/h)</div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-200">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 지도 초기화
        const map = L.map('map').setView([33.2635, 130.1500], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        let radarLayer = null;

        const sagaCities = [
            { id: "사가시", lat: 33.2635, lon: 130.3009 },
            { id: "가라쓰시", lat: 33.4549, lon: 129.9689 },
            { id: "도스시", lat: 33.3781, lon: 130.5186 },
            { id: "이마리시", lat: 33.2657, lon: 129.8804 },
            { id: "다케오시", lat: 33.1956, lon: 130.0219 },
            { id: "가시마시", lat: 33.1130, lon: 130.0988 },
            { id: "오기시", lat: 33.2847, lon: 130.2036 },
            { id: "우레시노시", lat: 33.0990, lon: 129.9800 },
            { id: "간자키시", lat: 33.3101, lon: 130.3688 },
            { id: "다쿠시", lat: 33.2828, lon: 130.1118 }
        ];

        function getWeatherIcon(code) {
            if (code <= 1) return "☀️"; if (code <= 3) return "☁️";
            if (code >= 51 && code <= 67) return "💧";
            if (code >= 80 && code <= 82) return "🌦️";
            if (code >= 95) return "⚡"; return "☁️";
        }

        // 2. JMA 기상 특보 가져오기
        async function fetchJmaWarnings() {
            try {
                const response = await fetch('https://www.jma.go.jp/bosai/warning/data/warning/410000.json');
                const data = await response.json();
                
                const warningCard = document.getElementById('warningCard');
                const warningContent = document.getElementById('warningContent');
                
                const warningCodes = {
                    '03': '호우경보', '04': '홍수경보', '05': '폭풍경보', '08': '해일주의보',
                    '10': '호우주의보', '13': '강풍주의보', '14': '풍랑주의보', '15': '홍수주의보', '16': '대설주의보'
                };

                let activeWarnings = [];

                if(data.areaTypes && data.areaTypes.length > 1) {
                    const areas = data.areaTypes[1].areas;
                    areas.forEach(area => {
                        area.warnings.forEach(w => {
                            if (w.status !== "해제" && w.status !== "발표없음" && warningCodes[w.code]) {
                                if(!activeWarnings.includes(warningCodes[w.code])) {
                                    activeWarnings.push(warningCodes[w.code]);
                                }
                            }
                        });
                    });
                }

                if (activeWarnings.length > 0) {
                    warningCard.className = "bg-red-50 p-5 rounded-xl shadow-sm border-l-4 border-red-500";
                    warningContent.innerHTML = `<ul class="list-disc pl-4 text-red-700">${activeWarnings.map(w => `<li>${w} 발령 중</li>`).join('')}</ul>`;
                } else {
                    warningCard.className = "bg-green-50 p-5 rounded-xl shadow-sm border-l-4 border-green-500";
                    warningContent.innerHTML = `<span class="text-green-700">현재 발효 중인 특보가 없습니다.</span>`;
                }
            } catch (error) {
                console.error("특보 로드 실패", error);
            }
        }

        // 3. RainViewer 레이더 타일 올리기
        async function fetchRadar() {
            try {
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();
                const radarPast = data.radar.past;
                
                if (radarPast.length > 0) {
                    const latestRadar = radarPast[radarPast.length - 1].path;
                    
                    // 기존 레이더가 있으면 지우고 새로 그림
                    if (radarLayer) map.removeLayer(radarLayer);
                    
                    radarLayer = L.tileLayer(`https://tilecache.rainviewer.com${latestRadar}/256/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0.65, zIndex: 10
                    }).addTo(map);
                }
            } catch (error) {
                console.error("레이더 데이터 로드 실패", error);
            }
        }

        // 4. 시정촌별 상세 예보 데이터 및 마커 렌더링
        async function fetchForecastData() {
            const lats = sagaCities.map(c => c.lat).join(',');
            const lons = sagaCities.map(c => c.lon).join(',');
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true&hourly=temperature_2m,weathercode,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&models=jma_seamless&timezone=Asia%2FTokyo`;

            try {
                const response = await fetch(url);
                const dataArray = await response.json();

                // 기존 마커 초기화 (레이더 레이어는 유지)
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker) map.removeLayer(layer);
                });

                dataArray.forEach((data, index) => {
                    const city = sagaCities[index];
                    const curr = data.current_weather;

                    // 24시간 예보 HTML
                    let hourlyHtml = '';
                    for(let i=0; i<24; i++) {
                        const time = new Date(data.hourly.time[i]).getHours();
                        hourlyHtml += `
                            <div class="flex-shrink-0 text-center p-2 bg-slate-50 rounded-lg border border-slate-100 min-w-[50px]">
                                <div class="text-[10px] text-slate-400 font-bold">${time}시</div>
                                <div class="text-sm my-1">${getWeatherIcon(data.hourly.weathercode[i])}</div>
                                <div class="text-xs font-black">${Math.round(data.hourly.temperature_2m[i])}°</div>
                            </div>
                        `;
                    }

                    // 7일 예보 HTML
                    let dailyHtml = '';
                    for(let i=0; i<7; i++) {
                        const date = new Date(data.daily.time[i]);
                        const dayStr = ['일','월','화','수','목','금','토'][date.getDay()];
                        dailyHtml += `
                            <div class="flex items-center justify-between text-xs py-1.5 border-b border-slate-50 last:border-0">
                                <span class="font-bold w-8 ${dayStr==='일'?'text-red-500':dayStr==='토'?'text-blue-500':''}">${dayStr}</span>
                                <span class="text-sm">${getWeatherIcon(data.daily.weathercode[i])}</span>
                                <div class="w-24 text-right">
                                    <span class="font-black text-slate-800">${Math.round(data.daily.temperature_2m_max[i])}°</span>
                                    <span class="text-slate-300 mx-1">/</span>
                                    <span class="font-bold text-slate-400">${Math.round(data.daily.temperature_2m_min[i])}°</span>
                                </div>
                            </div>
                        `;
                    }

                    // 마커 아이콘 HTML (기온, 강수, 풍향, 풍속 통합)
                    const markerHtml = `
                        <div class="weather-card-marker" style="width: 60px; height: 75px;">
                            <div class="text-[10px] font-bold text-slate-400 leading-tight">${city.id.replace('시','')}</div>
                            <div class="text-lg font-black text-slate-800 leading-tight">${Math.round(curr.temperature)}°</div>
                            <div class="text-sm mt-0.5">${getWeatherIcon(curr.weathercode)}</div>
                            <div class="flex items-center gap-0.5 mt-1">
                                <span class="wind-arrow" style="transform: rotate(${curr.winddirection}deg);">⬆️</span>
                                <span class="text-[9px] font-black text-blue-600">${Math.round(curr.windspeed)}</span>
                            </div>
                        </div>
                    `;

                    // 팝업 HTML
                    const popupHtml = `
                        <div class="bg-white">
                            <div class="bg-blue-600 p-4 text-white">
                                <h3 class="text-xl font-black">${city.id}</h3>
                                <p class="text-xs opacity-80">현재 ${Math.round(curr.temperature)}°C | 풍속 ${Math.round(curr.windspeed)}km/h</p>
                            </div>
                            <div class="p-4">
                                <h4 class="text-xs font-black text-slate-400 uppercase mb-3">24시간 시간별 예보</h4>
                                <div class="forecast-scroll mb-6">${hourlyHtml}</div>
                                <h4 class="text-xs font-black text-slate-400 uppercase mb-2">주간 예보 (7일)</h4>
                                <div class="bg-slate-50 p-3 rounded-xl">${dailyHtml}</div>
                            </div>
                        </div>
                    `;

                    const icon = L.divIcon({ className: '', html: markerHtml, iconSize: [60, 75], iconAnchor: [30, 37] });
                    L.marker([city.lat, city.lon], { icon }).addTo(map).bindPopup(popupHtml);
                });
            } catch (error) { console.error("예보 로딩 실패", error); }
        }

        function initDashboard() {
            fetchJmaWarnings();
            fetchRadar();
            fetchForecastData();
            document.getElementById('updateTime').textContent = `최종 갱신: ${new Date().toLocaleTimeString()}`;
        }

        // 초기 실행 및 10분 주기 갱신
        initDashboard();
        setInterval(initDashboard, 600000);
    </script>
</body>
</html>
