<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사가현 기상 맵 & 모델 비교</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 700px; width: 100%; border-radius: 1rem; z-index: 10; }
        
        /* 지도 위 온도 숫자 마커의 디자인 */
        .temp-marker {
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid #3b82f6; /* 파란색 테두리 */
            border-radius: 50%;
            font-weight: 900;
            font-size: 14px;
            color: #1e3a8a;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            /* 중앙 정렬을 위한 설정 */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 팝업 테이블 스타일 */
        .model-table th, .model-table td { padding: 4px 8px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        .model-table th { background-color: #f3f4f6; font-size: 11px; color: #6b7280; }
        .model-table td { font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">사가현 실시간 기온 맵</h1>
                <p class="text-slate-500 font-medium mt-1">숫자 클릭 시 글로벌 기상 모델 예보 비교 (JMA vs ECMWF vs GFS)</p>
            </div>
        </header>

        <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-200">
            <div id="map"></div>
        </div>
    </div>

    <script>
        // 1. 지도 초기화
        const map = L.map('map').setView([33.2635, 130.1500], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors, © CARTO',
            maxZoom: 18
        }).addTo(map);

        // 2. 사가현 주요 시정촌 10곳 좌표 배열
        const sagaCities = [
            { id: "사가시", lat: 33.2635, lon: 130.3009 },
            { id: "가라쓰시", lat: 33.4549, lon: 129.9689 },
            { id: "도스시", lat: 33.3781, lon: 130.5186 },
            { id: "이마리시", lat: 33.2657, lon: 129.8804 },
            { id: "다케오시", lat: 33.1956, lon: 130.0219 },
            { id: "가시마시", lat: 33.1130, lon: 130.0988 },
            { id: "오기시", lat: 33.2847, lon: 130.2036 },
            { id: "우레시노시", lat: 33.0990, lon: 129.9800 },
            { id: "간자키시", lat: 33.3101, lon: 130.3688 },
            { id: "다쿠시", lat: 33.2828, lon: 130.1118 }
        ];

        // 3. Open-Meteo API 다중 호출 및 모델 비교
        async function fetchTemperatures() {
            const lats = sagaCities.map(c => c.lat).join(',');
            const lons = sagaCities.map(c => c.lon).join(',');

            // current_weather: 현재 날씨
            // daily: 일일 예보 (최고기온, 강수량)
            // models: 일본(JMA), 유럽(ECMWF), 미국(GFS)
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true&daily=temperature_2m_max,precipitation_sum&models=jma_seamless,ecmwf_ifs,gfs_seamless&timezone=Asia%2FTokyo`;

            try {
                const response = await fetch(url);
                const data = await response.json(); // 10개 지역의 데이터가 배열로 들어옴

                data.forEach((locData, index) => {
                    const city = sagaCities[index];
                    const currentTemp = Math.round(locData.current_weather.temperature);
                    
                    // 오늘 기준 각 모델의 예보값 추출
                    const daily = locData.daily;
                    
                    // JMA (일본) 예보
                    const jmaTemp = daily.temperature_2m_max_jma_seamless ? Math.round(daily.temperature_2m_max_jma_seamless[0]) : '-';
                    const jmaRain = daily.precipitation_sum_jma_seamless ? daily.precipitation_sum_jma_seamless[0] : 0;
                    
                    // ECMWF (유럽) 예보
                    const ecmwfTemp = daily.temperature_2m_max_ecmwf_ifs ? Math.round(daily.temperature_2m_max_ecmwf_ifs[0]) : '-';
                    const ecmwfRain = daily.precipitation_sum_ecmwf_ifs ? daily.precipitation_sum_ecmwf_ifs[0] : 0;

                    // GFS (미국) 예보
                    const gfsTemp = daily.temperature_2m_max_gfs_seamless ? Math.round(daily.temperature_2m_max_gfs_seamless[0]) : '-';
                    const gfsRain = daily.precipitation_sum_gfs_seamless ? daily.precipitation_sum_gfs_seamless[0] : 0;

                    // Leaflet DivIcon 생성 (지도 위에 숫자로 그림)
                    const tempIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="temp-marker" style="width: 44px; height: 44px;">${currentTemp}°</div>`,
                        iconSize: [44, 44],
                        iconAnchor: [22, 22] // 중앙 정렬
                    });

                    // 팝업 내용 구성 (예보 비교 테이블)
                    const popupContent = `
                        <div style="min-width: 220px;">
                            <h3 class="text-base font-black text-slate-800 mb-1 border-b pb-1">${city.id} (현재 ${currentTemp}°C)</h3>
                            <p class="text-xs text-slate-500 mb-2">오늘의 최고기온 / 강수량 모델 비교</p>
                            <table class="w-full model-table mb-1">
                                <tr>
                                    <th>모델</th>
                                    <th>최고기온</th>
                                    <th>강수량</th>
                                </tr>
                                <tr>
                                    <td class="text-blue-700">🇯🇵 JMA</td>
                                    <td>${jmaTemp}°C</td>
                                    <td>${jmaRain} mm</td>
                                </tr>
                                <tr>
                                    <td class="text-emerald-700">🇪🇺 ECMWF</td>
                                    <td>${ecmwfTemp}°C</td>
                                    <td>${ecmwfRain} mm</td>
                                </tr>
                                <tr>
                                    <td class="text-orange-700">🇺🇸 GFS</td>
                                    <td>${gfsTemp}°C</td>
                                    <td>${gfsRain} mm</td>
                                </tr>
                            </table>
                        </div>
                    `;

                    // 지도에 마커 추가 및 팝업 연결
                    L.marker([city.lat, city.lon], { icon: tempIcon })
                        .addTo(map)
                        .bindPopup(popupContent);
                });

            } catch (error) {
                console.error("기상 데이터 로드 실패", error);
            }
        }

        fetchTemperatures();
        // 10분마다 갱신
        setInterval(fetchTemperatures, 600000);
    </script>
</body>
</html>
