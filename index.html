<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사가현 방재 & 공식 예보 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 800px; width: 100%; border-radius: 1rem; z-index: 10; }
        .weather-card-marker { background: white; border: 2px solid #3b82f6; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; transition: all 0.2s; }
        .weather-card-marker:hover { transform: scale(1.1); z-index: 1000 !important; }
        .wind-arrow { display: inline-block; font-size: 14px; color: #3b82f6; line-height: 1; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 340px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-7xl mx-auto py-8 px-4">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-end border-b pb-4 border-slate-300">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">사가현 종합 방재 포털</h1>
                <div class="flex items-center gap-3 mt-2">
                    <span class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded">JMA 공식 API 연동</span>
                    <p class="text-slate-500 font-medium">레이더 · 기상특보 · 기상청 발표 공식 주간 예보</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div id="warningCard" class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-slate-300">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">사가현 기상 특보 (JMA)</h2>
                    <div id="warningContent" class="text-sm font-bold text-slate-700">로딩 중...</div>
                </div>

                <div class="bg-slate-100 p-5 rounded-xl border border-slate-200 text-xs text-slate-600">
                    <p class="font-bold mb-3 text-slate-700 text-sm">💡 JMA 구역 안내</p>
                    <p class="mb-2">예보 정보는 기상청 공식 발표 기준에 따라 2개 구역으로 나뉩니다.</p>
                    <ul class="list-disc pl-4 space-y-1">
                        <li><b>사가현 남부:</b> 사가시, 도스시 등 8개 시정촌</li>
                        <li><b>사가현 북부:</b> 가라쓰시, 이마리시</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-200">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([33.2635, 130.1500], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap, © CARTO' }).addTo(map);

        // 사가현 시정촌 및 JMA 공식 예보 구역 코드 (남부: 410010, 북부: 410020)
        const sagaCities = [
            { id: "사가시", lat: 33.2635, lon: 130.3009, jmaArea: "410010" },
            { id: "가라쓰시", lat: 33.4549, lon: 129.9689, jmaArea: "410020" },
            { id: "도스시", lat: 33.3781, lon: 130.5186, jmaArea: "410010" },
            { id: "이마리시", lat: 33.2657, lon: 129.8804, jmaArea: "410020" },
            { id: "다케오시", lat: 33.1956, lon: 130.0219, jmaArea: "410010" },
            { id: "가시마시", lat: 33.1130, lon: 130.0988, jmaArea: "410010" },
            { id: "오기시", lat: 33.2847, lon: 130.2036, jmaArea: "410010" },
            { id: "우레시노시", lat: 33.0990, lon: 129.9800, jmaArea: "410010" },
            { id: "간자키시", lat: 33.3101, lon: 130.3688, jmaArea: "410010" },
            { id: "다쿠시", lat: 33.2828, lon: 130.1118, jmaArea: "410010" }
        ];

        // JMA 날씨 코드를 이모지로 변환
        function getJmaIcon(code) {
            const c = parseInt(code);
            if (c < 200) return "☀️"; // 맑음
            if (c < 300) return "☁️"; // 흐림
            if (c < 400) return "☔"; // 비
            if (c < 500) return "⛄"; // 눈
            return "☁️";
        }

        let jmaForecastData = null; // JMA 예보 데이터 저장용

        async function fetchJmaData() {
            // 1. 특보 (이전과 동일)
            try {
                const warnRes = await fetch('https://www.jma.go.jp/bosai/warning/data/warning/410000.json');
                const warnData = await warnRes.json();
                const warningCodes = { '03': '호우경보', '04': '홍수경보', '05': '폭풍경보', '08': '해일주의보', '10': '호우주의보', '13': '강풍주의보' };
                let activeWarnings = [];
                if(warnData.areaTypes && warnData.areaTypes.length > 1) {
                    warnData.areaTypes[1].areas.forEach(area => {
                        area.warnings.forEach(w => {
                            if (w.status !== "해제" && w.status !== "발표없음" && warningCodes[w.code]) {
                                if(!activeWarnings.includes(warningCodes[w.code])) activeWarnings.push(warningCodes[w.code]);
                            }
                        });
                    });
                }
                const warnCard = document.getElementById('warningCard');
                const warnContent = document.getElementById('warningContent');
                if (activeWarnings.length > 0) {
                    warnCard.className = "bg-red-50 p-5 rounded-xl shadow-sm border-l-4 border-red-500";
                    warnContent.innerHTML = `<ul class="list-disc pl-4 text-red-700">${activeWarnings.map(w => `<li>${w} 발령 중</li>`).join('')}</ul>`;
                } else {
                    warnCard.className = "bg-green-50 p-5 rounded-xl shadow-sm border-l-4 border-green-500";
                    warnContent.innerHTML = `<span class="text-green-700">현재 발효 중인 특보가 없습니다.</span>`;
                }
            } catch(e) {}

            // 2. JMA 공식 예보 데이터 가져오기
            try {
                const jmaRes = await fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/410000.json');
                jmaForecastData = await jmaRes.json();
            } catch(e) { console.error("JMA 예보 로드 실패"); }

            // 3. 레이더
            try {
                const radarRes = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const radarData = await radarRes.json();
                const latestRadar = radarData.radar.past[radarData.radar.past.length - 1].path;
                L.tileLayer(`https://tilecache.rainviewer.com${latestRadar}/256/{z}/{x}/{y}/2/1_1.png`, { opacity: 0.65, zIndex: 10 }).addTo(map);
            } catch(e) {}

            renderMapMarkers();
        }

        async function renderMapMarkers() {
            // 현재 기온 표출을 위한 Open-Meteo 호출 (관측치 용도)
            const lats = sagaCities.map(c => c.lat).join(',');
            const lons = sagaCities.map(c => c.lon).join(',');
            const curRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true&timezone=Asia%2FTokyo`);
            const curData = await curRes.json();

            curData.forEach((data, index) => {
                const city = sagaCities[index];
                const curr = data.current_weather;
                const areaCode = city.jmaArea;
                const areaName = areaCode === "410010" ? "사가현 남부" : "사가현 북부";

                // JMA 주간 예보 파싱 (jmaForecastData[1] 사용)
                let weeklyHtml = '<div class="text-sm text-slate-500 text-center py-4">예보 데이터가 없습니다.</div>';
                
                if (jmaForecastData && jmaForecastData[1]) {
                    const weekData = jmaForecastData[1];
                    const dates = weekData.timeSeries[0].timeDefines;
                    
                    // 해당 구역(남부/북부)의 인덱스 찾기
                    const weatherAreaIdx = weekData.timeSeries[0].areas.findIndex(a => a.area.code === areaCode);
                    const tempAreaIdx = weekData.timeSeries[1].areas.findIndex(a => a.area.code === areaCode);

                    if (weatherAreaIdx !== -1 && tempAreaIdx !== -1) {
                        const wCodes = weekData.timeSeries[0].areas[weatherAreaIdx].weatherCodes;
                        const pops = weekData.timeSeries[0].areas[weatherAreaIdx].pops;
                        const tMins = weekData.timeSeries[1].areas[tempAreaIdx].tempsMin;
                        const tMaxs = weekData.timeSeries[1].areas[tempAreaIdx].tempsMax;

                        weeklyHtml = '';
                        for(let i=0; i<dates.length; i++) {
                            const dateObj = new Date(dates[i]);
                            const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
                            const dayStr = ['일','월','화','수','목','금','토'][dateObj.getDay()];
                            
                            // 기상청 데이터는 시점에 따라 빈 문자열이 들어올 수 있음
                            const minT = tMins[i] ? tMins[i] : "-";
                            const maxT = tMaxs[i] ? tMaxs[i] : "-";
                            const pop = pops[i] && pops[i] !== "" ? `${pops[i]}%` : "-";

                            weeklyHtml += `
                                <div class="flex items-center justify-between text-xs py-2 border-b border-slate-200 last:border-0">
                                    <div class="w-12">
                                        <span class="block text-[10px] text-slate-400">${dateStr}</span>
                                        <span class="font-bold ${dayStr==='일'?'text-red-500':dayStr==='토'?'text-blue-500':''}">${dayStr}</span>
                                    </div>
                                    <div class="text-xl w-8 text-center">${getJmaIcon(wCodes[i])}</div>
                                    <div class="w-12 text-center text-[10px] font-bold text-blue-500 bg-blue-50 rounded py-0.5">☔ ${pop}</div>
                                    <div class="w-20 text-right">
                                        <span class="font-black text-slate-800">${maxT}°</span>
                                        <span class="text-slate-300 mx-1">/</span>
                                        <span class="font-bold text-blue-600">${minT}°</span>
                                    </div>
                                </div>
                            `;
                        }
                    }
                }

                const markerHtml = `
                    <div class="weather-card-marker" style="width: 60px; height: 75px;">
                        <div class="text-[10px] font-bold text-slate-400 leading-tight">${city.id.replace('시','')}</div>
                        <div class="text-lg font-black text-slate-800 leading-tight">${Math.round(curr.temperature)}°</div>
                        <div class="flex items-center gap-0.5 mt-2">
                            <span class="wind-arrow" style="transform: rotate(${curr.winddirection}deg);">⬆️</span>
                            <span class="text-[9px] font-black text-blue-600">${Math.round(curr.windspeed)}</span>
                        </div>
                    </div>
                `;

                const popupHtml = `
                    <div class="bg-white">
                        <div class="bg-slate-800 p-4 text-white">
                            <h3 class="text-xl font-black">${city.id}</h3>
                            <p class="text-xs text-blue-300">공식 예보 구역: ${areaName}</p>
                        </div>
                        <div class="p-4 bg-slate-50">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="text-xs font-black text-slate-500 uppercase">기상청 공식 주간 예보</h4>
                            </div>
                            <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                ${weeklyHtml}
                            </div>
                            <p class="text-[9px] text-slate-400 mt-2 text-right">※ 제공: 일본 기상청 (JMA)</p>
                        </div>
                    </div>
                `;

                const icon = L.divIcon({ className: '', html: markerHtml, iconSize: [60, 75], iconAnchor: [30, 37] });
                L.marker([city.lat, city.lon], { icon }).addTo(map).bindPopup(popupHtml);
            });
        }

        fetchJmaData();
    </script>
</body>
</html>
